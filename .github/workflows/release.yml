name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller packaging

      - name: Read version
        id: version
        run: |
          $ver = python -c "from version import __version__; print(__version__)"
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Read changelog
        id: changelog
        run: |
          if (Test-Path "RELEASE_NOTES.md") {
            $notes = Get-Content "RELEASE_NOTES.md" -Raw -Encoding utf8
          } else {
            $notes = "_Описание изменений не предоставлено._"
          }
          $delimiter = "NOTES_EOF_$([System.Guid]::NewGuid().ToString('N'))"
          echo "BODY<<$delimiter"  >> $env:GITHUB_OUTPUT
          echo $notes              >> $env:GITHUB_OUTPUT
          echo $delimiter          >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: pyinstaller LessonRecorder.spec --clean --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          # Папка выходных файлов
          New-Item -ItemType Directory -Force -Path "dist\installer" | Out-Null
          # Сборка установщика
          iscc installer\setup.iss
          # Переименовываем с версией
          $src = Get-ChildItem "dist\installer\*.exe" | Select-Object -First 1
          if ($src) {
            $dstName = "LessonRecorder_v${{ steps.version.outputs.VERSION }}_setup.exe"
            $dstPath = Join-Path $src.DirectoryName $dstName
            if ($src.FullName -ne $dstPath) {
              Rename-Item -Path $src.FullName -NewName $dstName -Force
            }
          }

      - name: Find installer
        id: installer
        run: |
          $file = Get-ChildItem -Path "dist\installer\*.exe" | Select-Object -First 1
          echo "PATH=$($file.FullName)" >> $env:GITHUB_OUTPUT
          echo "NAME=$($file.Name)"     >> $env:GITHUB_OUTPUT
          echo "Found: $($file.FullName)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "LessonRecorder v${{ steps.version.outputs.VERSION }}"
          body: |
            ${{ steps.changelog.outputs.BODY }}

            ---

            ### Установка
            1. Скачайте `${{ steps.installer.outputs.NAME }}`
            2. Запустите установщик
            3. Python и компоненты транскрипции установятся автоматически
            4. Готово — при следующем запуске приложение само предложит обновиться

            > **Python не требуется устанавливать отдельно** — установщик сделает это автоматически

            ### Системные требования
            - Windows 10/11 (64-bit)
            - 4 GB RAM (8 GB рекомендуется)
            - Интернет при первой установке (для Python и компонентов)
            - Интернет для AI конспектов (Groq / Gemini / OpenRouter — бесплатно)
          files: ${{ steps.installer.outputs.PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
